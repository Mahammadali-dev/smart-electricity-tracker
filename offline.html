<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#091310" />
    <title>GridSense Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07100d;
        --panel: rgba(14, 29, 24, 0.94);
        --line: rgba(111, 206, 167, 0.18);
        --text: #ecf7f2;
        --muted: #9eb7ae;
        --accent: #56d6ac;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at top left, rgba(86, 214, 172, 0.16), transparent 24%),
          var(--bg);
        color: var(--text);
      }
      .card {
        width: min(100%, 460px);
        border-radius: 28px;
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 28px;
        display: grid;
        gap: 14px;
        text-align: center;
      }
      .pill {
        display: inline-flex;
        justify-self: center;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(86, 214, 172, 0.12);
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.74rem;
      }
      p { margin: 0; color: var(--muted); line-height: 1.6; }
      h1 { margin: 0; font-size: 1.9rem; }
    </style>
  </head>
  <body>
    <article class="card">
      <span class="pill">Offline mode</span>
      <h1>GridSense is waiting for the network</h1>
      <p>The installed app shell is still available, but realtime sync, authentication, and IoT updates need a connection.</p>
      <p>Reconnect to Wi-Fi or mobile data and reopen the tracker to continue.</p>
    </article>
  </body>
</html>
